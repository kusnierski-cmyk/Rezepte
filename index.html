<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REZEPT.RAW | Drive Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        [v-cloak] { display: none; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overscroll-behavior-y: contain; }
        .card-container { perspective: 1200px; }
        .recipe-card { transition: transform 0.1s ease-out; transform-style: preserve-3d; background: #000; border: 1px solid rgba(255,255,255,0.1); will-change: transform; }
        .fixed-overlay { position: fixed; inset: 0; z-index: 200; background: #000; display: flex; flex-direction: column; }
        .input-raw { background: transparent !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 1.25rem; width: 100%; outline: none; border-radius: 0; font-weight: 700; font-size: 1rem; }
        .input-raw:focus { border-color: #fff !important; }
        .btn-white { background: #fff; color: #000; font-weight: 900; text-transform: uppercase; padding: 1.25rem; letter-spacing: 0.1em; text-align: center; transition: all 0.2s; cursor: pointer; }
        .btn-white:active { transform: scale(0.98); background: #ccc; }
        .btn-cancel { border: 1px solid rgba(255,255,255,0.2); padding: 1.25rem; text-transform: uppercase; font-weight: 900; font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    
    <nav class="fixed top-0 w-full z-[100] px-6 py-6 flex justify-between items-center bg-black border-b border-white/5">
        <h1 class="text-2xl font-black tracking-tighter uppercase leading-none italic">Rezept<span class="opacity-30">.Raw</span></h1>
        <div class="flex gap-4 items-center">
            <button v-if="!isLoggedIn" @click="handleAuth" class="text-[10px] font-black border border-white/20 px-3 py-1 uppercase tracking-widest">Login</button>
            <template v-else>
                <div v-if="syncing" class="animate-spin text-white/20"><i data-lucide="refresh-cw" size="14"></i></div>
                <button @click="openWeeklyPlan" class="p-2 opacity-50 hover:opacity-100 transition"><i data-lucide="calendar"></i></button>
                <button @click="openAddModal" class="bg-white text-black p-2 rounded-full"><i data-lucide="plus"></i></button>
            </template>
        </div>
    </nav>

    <main class="pt-24 pb-12 px-4 max-w-6xl mx-auto">
        <div v-if="!isLoggedIn" class="text-center py-20 opacity-20 uppercase font-black tracking-widest text-xs">Bitte mit Google verbinden</div>
        <div v-else class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-10">
            <div v-for="recipe in recipes" :key="recipe.id" 
                 class="card-container group cursor-pointer"
                 @mousemove="handleMouseMove($event)"
                 @mouseleave="handleMouseLeave($event)"
                 @click="viewRecipe(recipe)">
                <div class="recipe-card relative aspect-[3/4] overflow-hidden">
                    <img :src="recipe.imageUrl || 'https://via.placeholder.com/600x800?text=RAW'" class="w-full h-full object-cover transition-all duration-700 pointer-events-none">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80 pointer-events-none"></div>
                    <div class="absolute bottom-0 p-4 sm:p-8 pointer-events-none">
                        <p class="text-[8px] sm:text-[10px] font-black opacity-30 tracking-[0.3em] mb-1 sm:mb-2 uppercase">{{ (recipe.totalPrice || 0).toFixed(2) }} EUR</p>
                        <h3 class="text-lg sm:text-3xl font-black uppercase tracking-tighter leading-none">{{ recipe.name }}</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div v-if="modalOpen" class="fixed-overlay no-scrollbar overflow-y-auto">
        <div class="sticky top-0 z-[210] bg-black px-6 py-6 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-xs font-black uppercase tracking-[0.4em]">{{ isEditing ? 'Bearbeiten' : 'Neu' }}</h2>
            <button @click="closeModal" class="p-2"><i data-lucide="x"></i></button>
        </div>

        <div class="px-6 py-10 space-y-12 max-w-2xl mx-auto w-full">
            <div @click="$refs.fileInput.click()" class="aspect-square sm:aspect-video border border-dashed border-white/20 flex flex-col items-center justify-center relative cursor-pointer group bg-neutral-950">
                <img v-if="previewImage || form.imageUrl" :src="previewImage || form.imageUrl" class="absolute inset-0 w-full h-full object-cover opacity-40">
                <div class="relative z-10 text-center">
                    <i data-lucide="camera" class="mx-auto mb-2 opacity-30"></i>
                    <span class="text-[10px] font-black uppercase">{{ uploadLoading ? 'Lädt...' : 'Foto' }}</span>
                </div>
                <input type="file" ref="fileInput" class="hidden" @change="handleFileUpload" accept="image/*">
            </div>

            <input v-model="form.name" placeholder="REZEPT NAME" class="input-raw text-3xl uppercase tracking-tighter">

            <div class="space-y-6">
                <div v-for="(ing, index) in form.ingredients" :key="index" class="flex gap-2">
                    <input v-model="ing.name" placeholder="Zutat" class="input-raw">
                    <input type="number" v-model.number="ing.price" placeholder="€" class="input-raw w-24 text-center">
                    <button @click="removeIng(index)" class="opacity-30"><i data-lucide="minus-circle"></i></button>
                </div>
                <button @click="addIng" class="text-[10px] font-black uppercase tracking-widest border-b border-white/20">+ Zutat</button>
            </div>

            <textarea v-model="form.instructions" placeholder="Anleitung..." class="input-raw h-48 resize-none"></textarea>

            <div class="flex flex-col gap-4 pt-10 pb-20 border-t border-white/10">
                <div class="flex justify-between items-end mb-4 font-black">
                    <span class="opacity-30 uppercase text-[10px]">Gesamt</span>
                    <span class="text-4xl tracking-tighter">{{ currentTotal.toFixed(2) }} €</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="closeModal" class="btn-cancel">Abbrechen</button>
                    <button @click="saveRecipe" :disabled="uploadLoading || syncing" class="btn-white">Speichern</button>
                </div>
                <button v-if="isEditing" @click="deleteRecipe" class="text-red-500 font-bold text-[10px] uppercase pt-4 opacity-50">Löschen</button>
            </div>
        </div>
    </div>

    <div v-if="weeklyModal" class="fixed-overlay p-6 overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-3xl font-black italic uppercase">Wochenplan</h2>
            <button @click="weeklyModal = false" class="bg-white text-black p-4 rounded-full"><i data-lucide="arrow-left"></i></button>
        </div>
        <button @click="generateNewWeeklyPlan" class="w-full border border-white/20 py-4 text-[10px] font-black uppercase tracking-[0.3em] mb-10 hover:bg-white hover:text-black">Neu würfeln</button>
        <div class="grid grid-cols-1 md:grid-cols-7 gap-4 w-full">
            <div v-for="(day, idx) in days" :key="day" class="border border-white/10 p-6 bg-neutral-900 flex flex-col items-center">
                <p class="text-[10px] font-black opacity-30 mb-6 uppercase">{{ day }}</p>
                <div v-if="weeklyPlan[idx]" class="space-y-4 flex flex-col items-center">
                    <div class="w-24 h-24 overflow-hidden rounded-full border border-white/10">
                        <img :src="weeklyPlan[idx].imageUrl" class="w-full h-full object-cover">
                    </div>
                    <p class="text-xl font-black uppercase tracking-tighter text-center">{{ weeklyPlan[idx].name }}</p>
                </div>
                <div v-else class="text-[10px] opacity-10 py-10">LEER</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyCjsxob1ip3TFL42Z-Fc9PPNFQ20iBVMho';
    const CLIENT_ID = '816126303003-alj4h52nrdsko9u96tiftn4etj228i88.apps.googleusercontent.com';
    const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    const { createApp, ref, computed, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            const recipes = ref([]);
            const weeklyPlan = ref([]);
            const modalOpen = ref(false);
            const weeklyModal = ref(false);
            const isEditing = ref(false);
            const editingId = ref(null);
            const uploadLoading = ref(false);
            const syncing = ref(false);
            const previewImage = ref(null);
            const selectedFile = ref(null);
            const isLoggedIn = ref(false);
            const folderId = ref(null);
            const dataFileId = ref(null);
            const days = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
            const form = ref({ name: '', imageUrl: '', ingredients: [{ name: '', price: '' }], instructions: '' });

            let tokenClient;

            onMounted(() => {
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: DISCOVERY_DOCS });
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (resp) => {
                            if (resp.error) return;
                            isLoggedIn.value = true;
                            localStorage.setItem('raw_recipe_logged_in', 'true');
                            await setupDrive();
                        },
                    });
                    if (localStorage.getItem('raw_recipe_logged_in') === 'true') {
                        tokenClient.requestAccessToken({ prompt: '' });
                    }
                    lucide.createIcons();
                });
            });

            const setupDrive = async () => {
                // 1. Ordner "Rezepte" suchen oder erstellen
                const folderResp = await gapi.client.drive.files.list({
                    q: "name = 'Rezepte' and mimeType = 'application/vnd.google-apps.folder' and trashed = false"
                });
                if (folderResp.result.files.length > 0) {
                    folderId.value = folderResp.result.files[0].id;
                } else {
                    const f = await gapi.client.drive.files.create({ resource: { name: 'Rezepte', mimeType: 'application/vnd.google-apps.folder' } });
                    folderId.value = f.result.id;
                }

                // 2. Datei "rezepte_daten.json" suchen
                const fileResp = await gapi.client.drive.files.list({
                    q: "name = 'rezepte_daten.json' and trashed = false",
                    fields: "files(id, parents, name)"
                });

                const validFile = fileResp.result.files.find(f => f.parents && f.parents.includes(folderId.value));

                if (validFile) {
                    dataFileId.value = validFile.id;
                    const content = await gapi.client.drive.files.get({ fileId: dataFileId.value, alt: 'media' });
                    let data = content.result;
                    if (typeof data === 'string') try { data = JSON.parse(data); } catch(e) {}
                    if (data && data.recipes) {
                        recipes.value = data.recipes;
                        weeklyPlan.value = data.weeklyPlan || [];
                    } else if (Array.isArray(data)) {
                        recipes.value = data;
                    }
                } else {
                    const res = await gapi.client.drive.files.create({
                        resource: { name: 'rezepte_daten.json', parents: [folderId.value] },
                        fields: 'id'
                    });
                    dataFileId.value = res.result.id;
                    await syncData();
                }
                nextTick(() => lucide.createIcons());
            };

            const syncData = async () => {
                if (!dataFileId.value) return;
                syncing.value = true;
                const body = JSON.stringify({ recipes: recipes.value, weeklyPlan: weeklyPlan.value });
                await gapi.client.request({
                    path: `/upload/drive/v3/files/${dataFileId.value}`,
                    method: 'PATCH',
                    params: { uploadType: 'media' },
                    body: body
                });
                syncing.value = false;
            };

            const uploadImage = async (file) => {
                // Erst Datei erstellen mit korrektem Namen und Elternordner
                const res = await gapi.client.drive.files.create({
                    resource: { name: `img_${Date.now()}.jpg`, parents: [folderId.value] },
                    fields: 'id'
                });
                const fileId = res.result.id;
                // Dann Inhalt hochladen
                await gapi.client.request({
                    path: `/upload/drive/v3/files/${fileId}`,
                    method: 'PATCH',
                    params: { uploadType: 'media' },
                    body: file
                });
                // Berechtigungen setzen
                await gapi.client.drive.permissions.create({ fileId: fileId, resource: { role: 'reader', type: 'anyone' } });
                return `https://lh3.googleusercontent.com/u/0/d/${fileId}`;
            };

            const saveRecipe = async () => {
                if (!form.value.name) return;
                uploadLoading.value = true;
                try {
                    let imgUrl = form.value.imageUrl;
                    if (selectedFile.value) imgUrl = await uploadImage(selectedFile.value);
                    const newR = {
                        id: isEditing.value ? editingId.value : Date.now().toString(),
                        name: form.value.name.toUpperCase(),
                        imageUrl: imgUrl,
                        ingredients: JSON.parse(JSON.stringify(form.value.ingredients)),
                        instructions: form.value.instructions,
                        totalPrice: currentTotal.value
                    };
                    if (isEditing.value) {
                        const idx = recipes.value.findIndex(r => r.id === editingId.value);
                        recipes.value[idx] = newR;
                    } else {
                        recipes.value.unshift(newR);
                    }
                    await syncData();
                    closeModal();
                } finally { uploadLoading.value = false; }
            };

            const currentTotal = computed(() => form.value.ingredients.reduce((s, i) => s + (parseFloat(i.price) || 0), 0));
            const closeModal = () => { modalOpen.value = false; previewImage.value = null; selectedFile.value = null; document.body.style.overflow = "auto"; };
            
            return {
                recipes, modalOpen, form, currentTotal, saveRecipe, uploadLoading, syncing, closeModal, isLoggedIn, 
                handleAuth: () => tokenClient.requestAccessToken(),
                handleFileUpload: (e) => { selectedFile.value = e.target.files[0]; if(selectedFile.value) previewImage.value = URL.createObjectURL(selectedFile.value); },
                deleteRecipe: async () => { if(confirm("Löschen?")) { recipes.value = recipes.value.filter(r => r.id !== editingId.value); await syncData(); closeModal(); } },
                viewRecipe: (r) => { isEditing.value = true; editingId.value = r.id; form.value = JSON.parse(JSON.stringify(r)); modalOpen.value = true; document.body.style.overflow = "hidden"; nextTick(() => lucide.createIcons()); },
                openAddModal: () => { isEditing.value = false; form.value = { name: '', imageUrl: '', ingredients: [{ name: '', price: '' }], instructions: '' }; modalOpen.value = true; document.body.style.overflow = "hidden"; nextTick(() => lucide.createIcons()); },
                addIng: () => form.value.ingredients.push({ name: '', price: '' }),
                removeIng: (i) => form.value.ingredients.splice(i, 1),
                generateNewWeeklyPlan: async () => { if(recipes.value.length < 1) return; weeklyPlan.value = [...recipes.value].sort(() => 0.5 - Math.random()).slice(0, 7); await syncData(); },
                openWeeklyPlan: () => { weeklyModal.value = true; nextTick(() => lucide.createIcons()); },
                weeklyModal, weeklyPlan, days, 
                handleMouseMove: (e) => {
                    const card = e.currentTarget.querySelector('.recipe-card');
                    const r = e.currentTarget.getBoundingClientRect();
                    gsap.to(card, { rotationY: (e.clientX - r.left - r.width/2)/10, rotationX: -(e.clientY - r.top - r.height/2)/10, scale: 1.05, duration: 0.3 });
                }, 
                handleMouseLeave: (e) => gsap.to(e.currentTarget.querySelector('.recipe-card'), { rotationY: 0, rotationX: 0, scale: 1, duration: 0.5 })
            }
        }
    }).mount('#app');
</script>
</body>
</html>
