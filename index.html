<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REZEPT.RAW | PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        [v-cloak] { display: none; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overscroll-behavior-y: contain; }
        
        .card-container { perspective: 1200px; }
        .recipe-card { 
            background: #0d0d0d; 
            border: 1px solid rgba(255,255,255,0.1);
            transform-style: preserve-3d;
            will-change: transform;
        }

        .input-raw {
            background: #111 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 1.25rem;
            width: 100%;
            outline: none;
            color: #fff;
            font-weight: 700;
            border-radius: 8px;
        }
        .input-raw:focus { border-color: #fff !important; background: #161616 !important; }

        .btn-main { background: #fff; color: #000; font-weight: 900; text-transform: uppercase; padding: 1.25rem; letter-spacing: 0.1em; cursor: pointer; text-align: center; border-radius: 8px; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .fixed-overlay { position: fixed; inset: 0; z-index: 200; background: #000; display: flex; flex-direction: column; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animationen */
        .fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <!-- NAV -->
    <nav class="fixed top-0 w-full z-[100] px-6 py-6 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <h1 class="text-2xl font-black tracking-tighter uppercase italic">Recipe<span class="opacity-30">.Raw</span></h1>
        <div class="flex gap-4">
            <button v-if="!isLoggedIn" @click="handleAuth" class="text-[10px] font-black border border-white/20 px-4 py-2 uppercase tracking-widest">Connect</button>
            <template v-else>
                <button @click="openWeekly" class="p-2 opacity-50"><i data-lucide="calendar-days"></i></button>
                <button @click="openAdd" class="bg-white text-black p-2 rounded-full"><i data-lucide="plus"></i></button>
            </template>
        </div>
    </nav>

    <!-- DASHBOARD -->
    <main class="pt-28 pb-20 px-4 max-w-5xl mx-auto">
        <div v-if="isLoggedIn" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div v-for="recipe in recipes" :key="recipe.id" 
                 class="card-container group cursor-pointer fade-up"
                 @mousemove="handle3D" @mouseleave="reset3D"
                 @click="viewRecipe(recipe)">
                <div class="recipe-card relative aspect-[3/4] overflow-hidden rounded-2xl">
                    <img :src="recipe.imageUrl || 'https://via.placeholder.com/400x600?text=RAW'" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                    <div class="absolute bottom-0 p-4 w-full">
                        <p class="text-[8px] font-black opacity-40 tracking-widest uppercase mb-1">{{ (recipe.totalPrice || 0).toFixed(2) }} EUR</p>
                        <h3 class="text-base font-black uppercase leading-tight tracking-tight">{{ recipe.name }}</h3>
                    </div>
                </div>
            </div>
        </div>
        <div v-else class="h-[60vh] flex flex-col items-center justify-center opacity-20 uppercase font-black tracking-tighter">
            <i data-lucide="cloud-off" class="mb-4"></i>
            <p>Login required</p>
        </div>
    </main>

    <!-- MODAL -->
    <div v-if="modalOpen" class="fixed-overlay no-scrollbar overflow-y-auto">
        <header class="sticky top-0 bg-black/90 backdrop-blur-md p-6 border-b border-white/10 flex justify-between items-center z-10">
            <h2 class="text-xs font-black uppercase tracking-[0.3em]">{{ isEditing ? 'Edit Recipe' : 'New Recipe' }}</h2>
            <button @click="closeModal" class="p-2"><i data-lucide="x"></i></button>
        </header>

        <div class="p-6 space-y-10 max-w-2xl mx-auto w-full pb-32">
            <!-- Image Area -->
            <div @click="$refs.fileInput.click()" class="aspect-square bg-neutral-900 border border-white/5 flex items-center justify-center overflow-hidden rounded-3xl relative cursor-pointer group">
                <img v-if="previewImage || form.imageUrl" :src="previewImage || form.imageUrl" class="absolute inset-0 w-full h-full object-cover">
                <div class="relative z-10 flex flex-col items-center gap-2 bg-black/40 p-6 rounded-full backdrop-blur-md opacity-0 group-hover:opacity-100 transition">
                    <i data-lucide="camera"></i>
                </div>
                <input type="file" ref="fileInput" class="hidden" @change="handleFile" accept="image/*">
            </div>

            <input v-model="form.name" placeholder="GERICHTSNAME" class="input-raw text-3xl uppercase tracking-tighter">

            <div class="space-y-6">
                <h4 class="text-[10px] font-black opacity-30 tracking-[0.4em] uppercase">Zutaten</h4>
                <div v-for="(ing, idx) in form.ingredients" :key="idx" class="flex gap-2">
                    <input v-model="ing.name" placeholder="Zutat" class="input-raw">
                    <input v-model.number="ing.price" type="number" placeholder="€" class="input-raw w-24 text-center">
                    <button @click="form.ingredients.splice(idx,1)" class="p-2 text-red-500"><i data-lucide="trash-2"></i></button>
                </div>
                <button @click="form.ingredients.push({name:'', price:0})" class="text-[10px] font-black uppercase border border-white/10 px-4 py-2 rounded-full">+ Hinzufügen</button>
            </div>

            <textarea v-model="form.instructions" placeholder="ANLEITUNG..." class="input-raw h-64 resize-none"></textarea>

            <div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent">
                <div class="max-w-2xl mx-auto flex gap-4 items-center bg-black border border-white/10 p-4 rounded-2xl">
                    <div class="flex-1 pl-2">
                        <p class="text-[8px] font-black opacity-30 uppercase">Gesamtpreis</p>
                        <p class="text-2xl font-black tracking-tighter">{{ total.toFixed(2) }} €</p>
                    </div>
                    <button @click="save" :disabled="uploadLoading" class="btn-main px-10">
                        {{ uploadLoading ? 'Warten...' : 'Speichern' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- WEEKLY PLAN (SCREENSHOT READY) -->
    <div v-if="weeklyOpen" class="fixed-overlay p-6 overflow-y-auto no-scrollbar items-center justify-start">
        <div class="w-full max-w-md">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-black italic tracking-tighter uppercase">Wochenplan</h2>
                <button @click="weeklyOpen = false" class="bg-white text-black p-4 rounded-full"><i data-lucide="arrow-left"></i></button>
            </header>
            
            <div class="space-y-4 pb-20">
                <div v-for="(day, idx) in days" :key="day" class="flex flex-col items-center bg-neutral-900/50 p-6 rounded-[2.5rem] border border-white/5 text-center">
                    <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.3em] mb-4">{{ day }}</p>
                    <div v-if="weekPlan[idx]" class="w-full space-y-4">
                        <div class="w-32 h-32 rounded-full overflow-hidden border-2 border-white/10 mx-auto">
                            <img :src="weekPlan[idx].imageUrl" class="w-full h-full object-cover">
                        </div>
                        <p class="font-black uppercase tracking-tighter text-xl leading-none px-4">{{ weekPlan[idx].name }}</p>
                    </div>
                    <div v-else class="py-10 opacity-10 font-black italic">Noch kein Rezept</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyCjsxob1ip3TFL42Z-Fc9PPNFQ20iBVMho';
    const CLIENT_ID = '816126303003-alj4h52nrdsko9u96tiftn4etj228i88.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    const { createApp, ref, computed, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            const recipes = ref([]);
            const isLoggedIn = ref(false);
            const modalOpen = ref(false);
            const weeklyOpen = ref(false);
            const isEditing = ref(false);
            const uploadLoading = ref(false);
            const previewImage = ref(null);
            const selectedFile = ref(null);
            const folderId = ref(null);
            const dataFileId = ref(null);
            const weekPlan = ref([]);
            const form = ref({ id:'', name:'', imageUrl:'', ingredients:[], instructions:'' });
            const days = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];

            let tokenClient;

            onMounted(() => {
                gapi.load('client', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (res) => { 
                            if(res.error) return;
                            isLoggedIn.value = true;
                            await initDrive();
                        }
                    });
                    lucide.createIcons();
                });
            });

            const initDrive = async () => {
                try {
                    const list = await gapi.client.drive.files.list({ q: "name = 'Rezepte' and mimeType = 'application/vnd.google-apps.folder' and trashed = false" });
                    if(list.result.files.length > 0) folderId.value = list.result.files[0].id;
                    else {
                        const f = await gapi.client.drive.files.create({ resource: { name: 'Rezepte', mimeType: 'application/vnd.google-apps.folder' } });
                        folderId.value = f.result.id;
                    }
                    
                    const data = await gapi.client.drive.files.list({ q: `name = 'data.json' and '${folderId.value}' in parents and trashed = false` });
                    if(data.result.files.length > 0) {
                        dataFileId.value = data.result.files[0].id;
                        const res = await gapi.client.drive.files.get({ fileId: dataFileId.value, alt: 'media' });
                        recipes.value = Array.isArray(res.result) ? res.result : [];
                    } else {
                        const res = await gapi.client.drive.files.create({ resource: { name: 'data.json', parents: [folderId.value] }, media: { mimeType: 'application/json', body: '[]' } });
                        dataFileId.value = res.result.id;
                    }
                    nextTick(() => lucide.createIcons());
                } catch(e) { alert("Drive Init Error: " + e.message); }
            };

            const save = async () => {
                if(!form.value.name) return alert("Bitte Namen eingeben");
                uploadLoading.value = true;
                
                try {
                    // 1. Bild hochladen (falls neu ausgewählt)
                    if(selectedFile.value) {
                        const meta = { name: `img_${Date.now()}.jpg`, parents: [folderId.value] };
                        const formData = new FormData();
                        formData.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
                        formData.append('file', selectedFile.value);
                        
                        const imgRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${gapi.auth.getToken().access_token}` },
                            body: formData
                        });
                        const imgData = await imgRes.json();
                        await gapi.client.drive.permissions.create({ fileId: imgData.id, resource: { role: 'reader', type: 'anyone' } });
                        form.value.imageUrl = `https://lh3.googleusercontent.com/u/0/d/${imgData.id}`;
                    }

                    // 2. Daten aktualisieren
                    const recipe = { ...form.value, totalPrice: total.value };
                    if(isEditing.value) {
                        const idx = recipes.value.findIndex(r => r.id === recipe.id);
                        recipes.value[idx] = recipe;
                    } else {
                        recipe.id = Date.now().toString();
                        recipes.value.unshift(recipe);
                    }
                    
                    // 3. JSON zu Drive syncen
                    const syncRes = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${dataFileId.value}?uploadType=media`, {
                        method: 'PATCH',
                        headers: { 
                            Authorization: `Bearer ${gapi.auth.getToken().access_token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(recipes.value)
                    });

                    if(!syncRes.ok) throw new Error("Sync failed");

                    closeModal();
                } catch(e) { 
                    alert("Speichern fehlgeschlagen: " + e.message);
                } finally { 
                    uploadLoading.value = false; 
                }
            };

            const total = computed(() => form.value.ingredients.reduce((s, i) => s + (Number(i.price) || 0), 0));

            return {
                recipes, isLoggedIn, modalOpen, weeklyOpen, isEditing, form, days, weekPlan, previewImage, uploadLoading, total,
                handleAuth: () => tokenClient.requestAccessToken(),
                openAdd: () => { isEditing.value=false; form.value={id:'', name:'', imageUrl:'', ingredients:[], instructions:''}; previewImage.value=null; modalOpen.value=true; nextTick(()=>lucide.createIcons()); },
                viewRecipe: (r) => { isEditing.value=true; form.value=JSON.parse(JSON.stringify(r)); previewImage.value=null; modalOpen.value=true; nextTick(()=>lucide.createIcons()); },
                closeModal: () => { modalOpen.value=false; selectedFile.value=null; },
                handleFile: (e) => { selectedFile.value = e.target.files[0]; previewImage.value = URL.createObjectURL(selectedFile.value); },
                openWeekly: () => { weekPlan.value = [...recipes.value].sort(()=>0.5-Math.random()).slice(0,7); weeklyOpen.value=true; nextTick(()=>lucide.createIcons()); },
                handle3D: (e) => {
                    const card = e.currentTarget.querySelector('.recipe-card');
                    const r = e.currentTarget.getBoundingClientRect();
                    gsap.to(card, { rotationY: (e.clientX - r.left - r.width/2)/15, rotationX: -(e.clientY - r.top - r.height/2)/15, scale: 1.03, duration: 0.3 });
                },
                reset3D: (e) => gsap.to(e.currentTarget.querySelector('.recipe-card'), { rotationY: 0, rotationX: 0, scale: 1, duration: 0.5 })
            }
        }
    }).mount('#app');
</script>
</body>
</html>
